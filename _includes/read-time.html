{% assign words = include.content | strip_html | number_of_words %}

{% assign wpm = 180 %}
{% assign min_time = 1 %}

{% assign read_time = words | divided_by: wpm %}

{% unless read_time > 0 %}
  {% assign read_time = min_time %}
{% endunless %}

<span class="readtime">
  <em>{{ read_time }} min read</em>
</span>
